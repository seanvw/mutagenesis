<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Checkpoints — Insertional Mutagenesis</title>
<link rel="stylesheet" href="shared.css">
<style>
  header { padding: 24px 32px 8px; }
  h1 { margin: 0; font-weight: 600; font-size: 22px; letter-spacing: 0.2px; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

  main {
    display: grid;
    gap: 16px;
    padding: 16px 32px 48px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .panel { padding: 8px 4px; }
  .commit {
    display: grid;
    grid-template-columns: 110px 88px 1fr auto;
    gap: 14px;
    align-items: baseline;
    padding: 12px 18px;
    border-bottom: 1px solid #1f2342;
    font-size: 13px;
  }
  .commit:last-child { border-bottom: 0; }
  .commit .when { color: var(--muted); font-variant-numeric: tabular-nums; }
  .commit .sha {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: var(--good);
    text-decoration: none;
    font-size: 12px;
  }
  .commit .sha:hover { text-decoration: underline; }
  .commit .msg { color: var(--ink); line-height: 1.45; }
  .commit .msg .body {
    display: block;
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
    white-space: pre-wrap;
  }
  .commit .who { color: var(--muted); font-size: 12px; text-align: right; }
  .status {
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .status.error { color: #ff8a99; }
  @media (max-width: 720px) {
    .commit {
      grid-template-columns: 1fr auto;
      grid-template-areas: "msg sha" "who when";
      row-gap: 4px;
    }
    .commit .msg { grid-area: msg; }
    .commit .sha { grid-area: sha; text-align: right; }
    .commit .who { grid-area: who; text-align: left; }
    .commit .when { grid-area: when; text-align: right; }
  }
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html">Simulation</a>
  <a href="explainer.html">Explainer</a>
  <a href="biology.html">Biology</a>
  <a href="checkpoints.html" class="active">Checkpoints</a>
  <a href="about.html">About</a>
  <span class="spacer"></span>
  <a href="https://github.com/seanvw/mutagenesis" target="_blank" rel="noopener">GitHub ↗</a>
</nav>

<header>
  <h1>Checkpoints</h1>
  <div class="sub">Commit history snapshot for <a href="https://github.com/seanvw/mutagenesis" style="color: var(--accent);">github.com/seanvw/mutagenesis</a>, generated from <code style="color: var(--ink);">git log</code> at build time. Re-run <code style="color: var(--ink);">./build-commits.py</code> to refresh.</div>
</header>

<main>
  <section class="panel">
    <div id="commits"><div class="status">Loading checkpoints…</div></div>
  </section>
</main>

<script>
(() => {
  const container = document.getElementById('commits');

  const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });
  function relTime(iso) {
    const then = new Date(iso).getTime();
    const diffSec = (then - Date.now()) / 1000;
    const abs = Math.abs(diffSec);
    if (abs < 60)         return rtf.format(Math.round(diffSec), 'second');
    if (abs < 3600)       return rtf.format(Math.round(diffSec / 60), 'minute');
    if (abs < 86400)      return rtf.format(Math.round(diffSec / 3600), 'hour');
    if (abs < 86400 * 30) return rtf.format(Math.round(diffSec / 86400), 'day');
    return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function absTime(iso) {
    return new Date(iso).toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function escape(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render(commits) {
    if (!commits.length) {
      container.innerHTML = '<div class="status">No commits found.</div>';
      return;
    }
    container.innerHTML = commits.map(c => {
      // Strip Co-Authored-By trailers and blank lines from the body preview.
      const body = (c.body || '')
        .split('\n')
        .filter(l => l.trim() && !/^Co-Authored-By:/i.test(l.trim()))
        .join('\n')
        .trim();
      return `
        <div class="commit">
          <span class="when" title="${escape(absTime(c.date))}">${escape(relTime(c.date))}</span>
          <a class="sha" href="${escape(c.url)}" target="_blank" rel="noopener">${escape(c.short_sha)}</a>
          <span class="msg">${escape(c.subject)}${body ? `<span class="body">${escape(body)}</span>` : ''}</span>
          <span class="who">${escape(c.author)}</span>
        </div>
      `;
    }).join('');
  }

  fetch('commits.json', { cache: 'no-cache' })
    .then(r => {
      if (!r.ok) throw new Error(`commits.json returned ${r.status}`);
      return r.json();
    })
    .then(render)
    .catch(err => {
      container.innerHTML = `<div class="status error">Couldn't load commits.json: ${escape(err.message)}.<br>Run <code>./build-commits.py</code> to generate it.</div>`;
    });
})();
</script>
</body>
</html>
